apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-study-web-__CI_ENVIRONMENT_SLUG__
  namespace: __DEV_NAMESPACE__
  annotations:
    ref: __CI_ENVIRONMENT_SLUG__
  labels:
    app: ai-study-web
    env: __CI_ENVIRONMENT_SLUG__
    server-name: ai-study-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-study-web
      env: __CI_ENVIRONMENT_SLUG__
  template:
    metadata:
      labels:
        app: ai-study-web
        env: __CI_ENVIRONMENT_SLUG__
        server-name: ai-study-web
    spec:
      imagePullSecrets:
        - name: harbor
      containers:
        - name: web
          image: __IMAGE__:__TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
